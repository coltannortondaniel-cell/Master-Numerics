# Render Blueprint — deploys Master Numerics as a single web service
# (Express serves both the API + Socket.io and the built React client),
# plus managed PostgreSQL and Redis. See DEPLOY.md for the click-through.
#
# Free-demo mode: PAYWALL_ENABLED=false opens all content; Stripe/email are
# optional. Add real keys later (see DEPLOY.md) to turn on payments.

databases:
  - name: master-numerics-db
    databaseName: master_numerics
    user: mn
    plan: free

services:
  # Redis (Render Key Value) — used for leaderboard cache / presence.
  - type: redis
    name: master-numerics-redis
    plan: free
    ipAllowList: [] # only reachable from Render services

  # The app: API + WebSockets + static client.
  - type: web
    name: master-numerics
    runtime: node
    plan: free
    region: oregon
    branch: claude/zealous-mayer-6qrsqn
    healthCheckPath: /api/health
    buildCommand: >-
      cd server && npm install && npx prisma generate && npm run build &&
      cd ../client && npm install && npm run build
    # db push + idempotent seed run on boot, then the server starts.
    startCommand: cd server && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PAYWALL_ENABLED
        value: "false"
      - key: CLIENT_DIST
        value: /opt/render/project/src/client/dist
      - key: DATABASE_URL
        fromDatabase:
          name: master-numerics-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: master-numerics-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
