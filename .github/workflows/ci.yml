name: CI

# Quality gate for the curriculum-as-data pipeline and both packages.
# Runs on every PR and on pushes to main. Any failing step fails the job.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    env:
      # Prisma reads DATABASE_URL from the schema's datasource block. No step
      # here connects to a database (typecheck, content validation, and the
      # client build are all offline), so a dummy URL is enough.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ---- Server ----
      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Server typecheck
        working-directory: server
        run: npx tsc -p tsconfig.json --noEmit

      - name: Validate curriculum content
        working-directory: server
        run: npm run content:validate

      # ---- Client ----
      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Client typecheck
        working-directory: client
        run: npx tsc --noEmit

      - name: Client build (same command Render runs)
        working-directory: client
        run: npm run build
