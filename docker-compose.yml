version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mn-postgres
    environment:
      POSTGRES_USER: mn
      POSTGRES_PASSWORD: mn_dev_password
      POSTGRES_DB: master_numerics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mn -d master_numerics"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mn-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
